{% extends 'base.html' %}

{% block title %}Staff Login - M.B Shifa Clinic{% endblock %}

{% block content %}
<div class="glass-card">
    <div class="main-header" style="padding-top:0;">
        <h2>Staff Login</h2>
        <p>Clinic Administrator Access</p>
    </div>
    
    {% if error %}
    <div style="background: rgba(255, 107, 107, 0.1); border: 1px solid var(--danger); color: var(--danger); padding: 0.8rem; border-radius: 10px; margin-bottom: 1rem; text-align: center;">
        {{ error }}
    </div>
    {% endif %}
    
    <form method="POST" action="{% url 'staff_login' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary">Sign In</button>
    </form>
</div>
{% endblock %}
